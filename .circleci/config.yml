# CircleCI → TestFlight + Google Play, fully non-interactive (EAS Build + Submit).
#
# Nothing interactive runs here and no Apple/Google/Expo secret is committed.
# CircleCI only drives `eas-cli` on a cheap Linux box; the macOS/Android builds +
# code signing happen on Expo's EAS cloud. iOS signing credentials are generated
# by EAS from an App Store Connect API key (no interactive Apple login); the
# Android upload keystore is generated and stored by EAS automatically. `eas
# submit` then uploads the iOS build to TestFlight (ASC API key) and the Android
# build to the Google Play internal track (a Google Play service-account key).
#
# Two workflows:
#   bootstrap : run ONCE, manually, by pushing the `eas-bootstrap` branch. Creates
#               your EAS project and prints its projectId for you to copy into the
#               EAS_PROJECT_ID env var. (Skip if you already have a projectId.)
#   release   : on every `v*` git tag, build iOS on EAS and submit to TestFlight,
#               and (if Android is configured) build Android and submit to the
#               Google Play internal track. The two run in parallel and are
#               independent — the Android job soft-skips when its env vars are
#               unset, so you can ship iOS first without the release going red.
#
# Required CircleCI environment variables (provided via the `hydra-cci` context:
# Organization Settings > Contexts > hydra-cci):
#   EXPO_TOKEN            Expo access token (expo.dev > Settings > Access Tokens).
#   EXPO_OWNER            your Expo account/username (used by eas-cli to find the project).
#   EAS_PROJECT_ID        your EAS project id (from the bootstrap job, or `eas init`).
#   IOS_BUNDLE_ID         your iOS bundle identifier (e.g. com.yourname.hydra).
#   ASC_API_KEY_BASE64    base64 of your App Store Connect API key .p8
#                         (`base64 -i AuthKey_XXXX.p8 | pbcopy`).
#   EXPO_ASC_KEY_ID       App Store Connect API Key ID (e.g. SFB993FB5F).
#   EXPO_ASC_ISSUER_ID    App Store Connect Issuer ID (a UUID).
#   EXPO_APPLE_TEAM_ID    your Apple Developer Team ID (e.g. 77KQ969CHE).
#   EXPO_APPLE_TEAM_TYPE  INDIVIDUAL | COMPANY_OR_ORGANIZATION | IN_HOUSE.
#   ASC_APP_ID            numeric App Store Connect app id (App Store Connect > app > App Information).
# Android (optional — the android job soft-skips unless BOTH of these are set):
#   ANDROID_PACKAGE       Android package name (e.g. com.yourname.hydra). Also add
#                         this as an EAS production env var so the build server's
#                         prebuild sees it.
#   GOOGLE_SERVICE_ACCOUNT_JSON_BASE64  base64 of the Google Play service-account
#                         .json key with Play Developer API access
#                         (`base64 -i play-service-account.json | pbcopy`).
# Optional:
#   SENTRY_AUTH_TOKEN / SENTRY_ORG / SENTRY_PROJECT  for Sentry source maps; warns+skips if unset.
#
# See docs/ci/circleci-testflight-setup.md for the one-time web-portal setup.

version: 2.1

executors:
  node:
    docker:
      - image: cimg/node:22.11
    resource_class: medium

commands:
  install_eas:
    steps:
      - run:
          name: Install eas-cli
          # cimg/node runs as the non-root `circleci` user, so a global install
          # into /usr/local/lib needs sudo (the image has passwordless sudo).
          command: sudo npm install -g eas-cli@latest
      - run:
          name: Verify EXPO_TOKEN and show authenticated account
          command: |
            if [ -z "$EXPO_TOKEN" ]; then
              echo "EXPO_TOKEN is not set. Add it to the hydra-cci context (Organization Settings > Contexts)."
              exit 1
            fi
            eas --version
            eas whoami
  install_deps:
    steps:
      - run:
          name: Install project dependencies
          # eas init/build evaluate app.config.ts, which resolves config plugins
          # (e.g. expo-router) from node_modules, so deps must be present.
          command: npm ci

jobs:
  # One-time: create/link the EAS project under your account, then print the id.
  eas_bootstrap:
    executor: node
    steps:
      - checkout
      - install_eas
      - install_deps
      - run:
          name: Create/link EAS project and print its id
          command: |
            eas init --non-interactive --force
            echo "================================================================"
            echo "Copy the projectId below into the EAS_PROJECT_ID CircleCI env var:"
            eas project:info

  ios_build_and_submit:
    executor: node
    steps:
      - checkout
      - install_eas
      - install_deps
      - run:
          name: Verify release env vars are present
          command: |
            missing=0
            for v in EXPO_OWNER EAS_PROJECT_ID IOS_BUNDLE_ID ASC_API_KEY_BASE64 \
                     EXPO_ASC_KEY_ID EXPO_ASC_ISSUER_ID EXPO_APPLE_TEAM_ID \
                     EXPO_APPLE_TEAM_TYPE ASC_APP_ID; do
              if [ -z "$(eval echo \$$v)" ]; then echo "Missing env var: $v"; missing=1; fi
            done
            [ "$missing" = "0" ] || { echo "Set the missing vars in CircleCI Project Settings."; exit 1; }
      - run:
          name: Write App Store Connect API key (.p8) from env
          command: |
            echo "$ASC_API_KEY_BASE64" | base64 --decode > "$HOME/asc_api_key.p8"
            # eas reads this path to manage iOS signing credentials non-interactively.
            echo 'export EXPO_ASC_API_KEY_PATH="$HOME/asc_api_key.p8"' >> "$BASH_ENV"
      - run:
          name: Inject submit credentials into eas.json (kept out of git)
          command: |
            node -e '
              const fs = require("fs");
              const c = JSON.parse(fs.readFileSync("eas.json", "utf8"));
              c.submit = c.submit || {};
              c.submit.production = c.submit.production || {};
              c.submit.production.ios = {
                ascApiKeyPath: process.env.EXPO_ASC_API_KEY_PATH,
                ascApiKeyId: process.env.EXPO_ASC_KEY_ID,
                ascApiKeyIssuerId: process.env.EXPO_ASC_ISSUER_ID,
                ascAppId: process.env.ASC_APP_ID,
              };
              fs.writeFileSync("eas.json", JSON.stringify(c, null, 2));
              console.log("Injected submit.production.ios into eas.json");
            '
      - run:
          name: Build on EAS and submit to TestFlight (non-interactive)
          # --auto-submit chains `eas submit` after the build. EAS generates the
          # iOS distribution cert + provisioning profile from the ASC API key
          # (EXPO_ASC_* env), so no interactive Apple login is needed.
          command: |
            eas build \
              --platform ios \
              --profile production \
              --non-interactive \
              --auto-submit

  android_build_and_submit:
    executor: node
    steps:
      - checkout
      - run:
          name: Skip when Android isn't configured yet
          # Lets you ship iOS first: with no Android creds, halt this job as a
          # SUCCESS (step halt exits 0) so the release tag doesn't go red.
          command: |
            if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON_BASE64" ] || [ -z "$ANDROID_PACKAGE" ]; then
              echo "Android not configured (GOOGLE_SERVICE_ACCOUNT_JSON_BASE64 / ANDROID_PACKAGE unset)."
              echo "Add both to the hydra-cci context to enable Android releases. Skipping."
              circleci-agent step halt
            fi
      - install_eas
      - install_deps
      - run:
          name: Verify Android release env vars are present
          command: |
            missing=0
            for v in EXPO_OWNER EAS_PROJECT_ID ANDROID_PACKAGE \
                     GOOGLE_SERVICE_ACCOUNT_JSON_BASE64; do
              if [ -z "$(eval echo \$$v)" ]; then echo "Missing env var: $v"; missing=1; fi
            done
            [ "$missing" = "0" ] || { echo "Set the missing vars in the hydra-cci context."; exit 1; }
      - run:
          name: Write Google Play service-account key (.json) from env
          command: |
            echo "$GOOGLE_SERVICE_ACCOUNT_JSON_BASE64" | base64 --decode > "$HOME/play_service_account.json"
            # eas submit reads this path to upload the build to Google Play.
            echo 'export GOOGLE_SERVICE_ACCOUNT_KEY_PATH="$HOME/play_service_account.json"' >> "$BASH_ENV"
      - run:
          name: Inject submit credentials into eas.json (kept out of git)
          command: |
            node -e '
              const fs = require("fs");
              const c = JSON.parse(fs.readFileSync("eas.json", "utf8"));
              c.submit = c.submit || {};
              c.submit.production = c.submit.production || {};
              c.submit.production.android = {
                serviceAccountKeyPath: process.env.GOOGLE_SERVICE_ACCOUNT_KEY_PATH,
                track: "internal",
              };
              fs.writeFileSync("eas.json", JSON.stringify(c, null, 2));
              console.log("Injected submit.production.android into eas.json");
            '
      - run:
          name: Build on EAS and submit to Google Play internal track (non-interactive)
          # EAS generates/stores the Android upload keystore automatically, then
          # --auto-submit uploads the .aab to the Google Play internal track with
          # the service-account key. NOTE: a brand-new Play app may require ONE
          # manual .aab upload via the Play Console before the API can submit.
          command: |
            eas build \
              --platform android \
              --profile production \
              --non-interactive \
              --auto-submit

workflows:
  bootstrap:
    jobs:
      - eas_bootstrap:
          # All env vars live in the `hydra-cci` context (Organization Settings >
          # Contexts), not project-level env vars.
          context:
            - hydra-cci
          filters:
            branches:
              only: /^eas-bootstrap$/
  release:
    jobs:
      - ios_build_and_submit:
          context:
            - hydra-cci
          # Tags don't run by default in CircleCI; opt in AND ignore all branches
          # so only `v*` tags trigger a release.
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
      - android_build_and_submit:
          context:
            - hydra-cci
          # Runs in parallel with iOS and independently; soft-skips when Android
          # env vars are unset (see the job's first step).
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
